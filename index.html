<!DOCTYPE html>
<html>
<head>
  <title>NFA to DFA Converter</title>

  <style>
    body {
      font-family: "Segoe UI";
      background: #0b0920;
      color: white;
      padding: 20px;
    }

    h2 {
      color: #a78bfa;
    }

    input, textarea {
      padding: 8px;
      margin: 5px 0;
      background: #111;
      color: white;
      border: 1px solid #555;
      width: 300px;
    }

    textarea {
      width: 500px;
    }

    button {
      padding: 10px 20px;
      background: #a78bfa;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #c4b5fd;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 70%;
      font-size: 16px;
    }

    th, td {
      border: 1px solid #666;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #1c1836;
      color: #c4b5fd;
    }

    td:first-child {
      font-weight: bold;
      color: #a78bfa;
    }

    .start {
      color: #4ade80;
    }

    .final {
      color: #fbbf24;
    }

    tr:hover {
      background: #151233;
    }
  </style>
</head>

<body>

<h2>NFA → DFA Converter</h2>

States:<br>
<input id="states" value="q0,q1,q2"><br>

Alphabet:<br>
<input id="alpha" value="a,b"><br>

Start:<br>
<input id="start" value="q0"><br>

Accept:<br>
<input id="accept" value="q2"><br>

<h3>Transitions (state,symbol=states)</h3>
<textarea id="transitions" rows="6">
q0,a=q0,q1
q0,b=q0
q1,b=q2
</textarea><br>

<button onclick="convert()">Convert</button>

<div id="tableOutput"></div>

<script>
function parseList(str) {
  return str.split(",").map(s => s.trim()).filter(s => s);
}

function convert() {
  const states = parseList(document.getElementById("states").value);
  const alpha = parseList(document.getElementById("alpha").value);
  const start = document.getElementById("start").value.trim();
  const accept = parseList(document.getElementById("accept").value);

  const lines = document.getElementById("transitions").value.trim().split("\n");

  let trans = {};
  states.forEach(s => trans[s] = {});

  lines.forEach(line => {
    let [left, right] = line.split("=");
    let [state, sym] = left.split(",");
    trans[state][sym] = parseList(right);
  });

  renderBetterTable(states, alpha, start, accept, trans);
}

function renderBetterTable(states, alpha, start, accept, trans) {
  let html = "<table>";

  // Header
  html += "<tr><th>State / Alphabet</th>";
  alpha.forEach(a => html += `<th>${a}</th>`);
  html += "</tr>";

  // Rows
  states.forEach(state => {
    let label = state;
    let cls = "";

    if (state === start) {
      label = "→" + label;
      cls = "start";
    }

    if (accept.includes(state)) {
      label = "*" + label;
      cls = "final";
    }

    html += `<tr><td class="${cls}">${label}</td>`;

    alpha.forEach(sym => {
      let val = trans[state][sym] ? trans[state][sym].join(", ") : "—";

      // mark final inside cell
      if (val !== "—") {
        val = val.split(", ").map(s =>
          accept.includes(s) ? "*" + s : s
        ).join(", ");
      }

      html += `<td>${val}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("tableOutput").innerHTML = html;
}
</script>

</body>
</html>
